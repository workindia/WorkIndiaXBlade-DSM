name: CI

on:
  # Run CI on pull requests to main
  # Direct pushes to main are handled by the release workflow
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test Packages
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build packages in dependency order
        run: npm run build
        # Build tokens first (no dependencies), then dsm (depends on tokens)
        # This ensures type definitions are available for ESLint type checking

      - name: Check build artifacts
        run: |
          test -d packages/tokens/build || exit 1
          test -d packages/dsm/build || exit 1
          test -d packages/mcp/dist || exit 1

      - name: Run linter
        run: npm run lint

      - name: Run type checking
        run: npm run typecheck

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage reports
        uses: codecov/codecov-action@v5
        if: matrix.node-version == '22.x'
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  changesets:
    name: Changesets
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-slim
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0

      - name: Generate changesets status
        id: changesets-status
        uses: changesets/action/pr-status@v1.9.0

      - name: Comment on PR
        uses: changesets/action/pr-comment@v1.9.0
        with:
          body: ${{ steps.changesets-status.outputs.comment-body }}
